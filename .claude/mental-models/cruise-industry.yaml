# ─── PREFIJOS DE NOMBRES DE BARCOS ─────────────────────────────────────
ship_name_prefixes:
  to_normalize:
    - "M/S"    # Motonave/Motor Ship
    - "M/V"    # Motor Vessel
    - "M.S."   # Motor Ship
    - "M.V."   # Motor Vessel
    - "MS "    # Motor Ship (sin slash)
    - "MV "    # Motor Vessel (sin slash)
    - "SS "    # Steam Ship
    - "S/S"    # Steam Ship
  note: >
    APIQROO usa prefijos inconsistentes. Siempre normalizar a nombre limpio
    para JOIN con tabla maestra. Ejemplo: "M/V MSC WORLD AMERICA" → "MSC WORLD AMERICA"
